name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  smoke:
    name: fresh-clone demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Typst
        run: |
          curl -fsSL https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz | tar -xJ
          sudo install -m 0755 typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          typst --version
      - run: npm ci
      - run: bash scripts/smoke-fresh-clone.sh
